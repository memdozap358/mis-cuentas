<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Nakama Vault: Gear Red ⚡</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            /* FONDO GEAR 5 - Link más estable */
            background: #000 url('https://images.alphacoders.com/129/1291196.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: -1;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .card {
            background: rgba(10, 10, 10, 0.9);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ff0000; /* ROJO ELÉCTRICO */
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
            box-sizing: border-box;
        }

        /* --- LOGIN CUADRADO --- */
        #login-screen {
            width: 350px;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #login-screen h2 { color: #ff0000; text-shadow: 0 0 10px #ff0000; margin: 0; }
        #login-screen p { font-size: 0.85rem; color: #bbb; margin: 10px 0 20px 0; }

        input {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border-radius: 8px; border: 1px solid #444;
            background: rgba(0, 0, 0, 0.8); color: #ff0000;
            text-align: center; font-size: 1.1rem; font-weight: bold;
            outline: none; box-sizing: border-box;
        }

        .main-btn { 
            background: #ff0000; color: white; border: none; 
            padding: 12px; border-radius: 8px; width: 100%; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* --- DASHBOARD (Oculto al inicio) --- */
        #dashboard-screen {
            display: none; /* Esto evita que se vea al costado */
            width: 95%;
            max-width: 600px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .menu-btn {
            background: transparent; color: #ff0000;
            border: 1px solid #ff0000; padding: 10px;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }

        .menu-btn:hover { background: #ff0000; color: white; }

        /* --- SECCIONES --- */
        .seccion-cuentas { display: none; text-align: left; max-height: 40vh; overflow-y: auto; padding-right: 10px; }
        .visible { display: block; }

        .dato-box {
            background: rgba(30, 0, 0, 0.3);
            padding: 12px; border-radius: 8px; margin-bottom: 8px;
            border-left: 4px solid #ff0000; font-size: 0.85rem;
        }

        .key-tag { color: #f1c40f; font-weight: bold; }
        .cerrar-btn { background: #660000; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 20px;}

        /* Scroll Rojo */
        .seccion-cuentas::-webkit-scrollbar { width: 4px; }
        .seccion-cuentas::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2>🏴‍☠️ NAKAMA VAULT</h2>
        <p>onichan mete tu llave aqui para abrirte mi interior</p>
        <input type="password" id="pass" placeholder="LLAVE MAESTRA">
        <button class="main-btn" onclick="entrar()">ABRIR PORTAL ⚡</button>
    </div>

    <div id="dashboard-screen" class="card">
        <h2 style="color: #f1c40f;">💎 MIS TESOROS</h2>
        <div class="menu-grid">
            <button class="menu-btn" onclick="mostrar('roblox')">🎮 ROBLOX</button>
            <button class="menu-btn" onclick="mostrar('tiktok')">📱 TIKTOK</button>
            <button class="menu-btn" onclick="mostrar('facebook')">👥 FACEBOOK</button>
            <button class="menu-btn" onclick="mostrar('instagram')">📸 INSTAGRAM</button>
            <button class="menu-btn" onclick="mostrar('gmail')">📧 GMAIL</button>
            <button class="menu-btn" onclick="mostrar('otros')">➕ OTROS</button>
        </div>

        <div id="roblox" class="seccion-cuentas"><div id="roblox-list"></div></div>
        <div id="tiktok" class="seccion-cuentas"><div id="tiktok-list"></div></div>
        <div id="facebook" class="seccion-cuentas"><div id="facebook-list"></div></div>
        <div id="instagram" class="seccion-cuentas"><div id="instagram-list"></div></div>
        <div id="gmail" class="seccion-cuentas"><div id="gmail-list"></div></div>
        <div id="otros" class="seccion-cuentas"><div id="otros-list"></div></div>

        <button class="cerrar-btn" onclick="location.reload()">CERRAR SESIÓN</button>
    </div>

    <script>
        function generarEspacios(idPadre, tipo) {
            const contenedor = document.getElementById(idPadre);
            for (let i = 1; i <= 30; i++) {
                const div = document.createElement('div');
                div.className = 'dato-box';
                div.innerHTML = tipo === 'roblox' 
                    ? `<strong>ACC ${i}:</strong> CORREOS: --- | CONTRASEÑA: --- | <span class="key-tag">KEY: NO</span>`
                    : `<strong>CUENTA ${i}:</strong> CORREOS: --- | CONTRASEÑA: ---`;
                contenedor.appendChild(div);
            }
        }

        generarEspacios('roblox-list', 'roblox');
        generarEspacios('tiktok-list', 'otros');
        generarEspacios('facebook-list', 'otros');
        generarEspacios('instagram-list', 'otros');
        generarEspacios('gmail-list', 'otros');
        generarEspacios('otros-list', 'otros');

        function entrar() {
            if (document.getElementById("pass").value === "904369662") { 
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("dashboard-screen").style.display = "block";
            } else {
                alert("Llave incorrecta, onichan... ❌");
            }
        }

        function mostrar(id) {
            const secciones = document.getElementsByClassName("seccion-cuentas");
            for (let s of secciones) s.classList.remove("visible");
            document.getElementById(id).classList.add("visible");
        }

        document.getElementById("pass").addEventListener("keydown", (e) => { if(e.key === "Enter") entrar(); });
    </script>
</body>
</html>
