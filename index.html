<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Bóveda Secreta Oni-chan ⚡</title>
    <style>
        /* Fondo con animación de imágenes de anime */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #101010; /* Color de respaldo */
            background-image: url('https://i.pinimg.com/originals/f3/f1/e2/f3f1e29e9d6d506d332617f699042c1d.gif'); /* Fondo de One Piece */
            background-size: cover;
            background-position: center;
            animation: anime-bg 20s infinite; /* Animación de fondo */
        }

        /* Definición de la animación de fondo */
        @keyframes anime-bg {
            0%, 100% { background-image: url('https://i.pinimg.com/originals/f3/f1/e2/f3f1e29e9d6d506d332617f699042c1d.gif'); } /* Luffy */
            25% { background-image: url('https://i.pinimg.com/originals/a1/6d/46/a16d460e0a5198008892d5c36773a4b9.gif'); } /* Tokyo Ghoul */
            50% { background-image: url('https://i.pinimg.com/originals/77/6c/1c/776c1c877993414a38a7c645b8f6733b.gif'); } /* Meme o GIF */
            75% { background-image: url('https://i.pinimg.com/originals/e5/a1/c6/e5a1c6a28795550a2e3792f3a67d9834.gif'); } /* Zoro o Zoro meme */
        }

        /* El cuadrado del centro (tarjeta) */
        .card {
            background: rgba(30, 30, 30, 0.9); /* Fondo oscuro semitransparente */
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 2px solid #333; /* Borde más oscuro */
            color: #eee;
        }

        h2 { color: #5dade2; margin-bottom: 20px; font-size: 1.5rem; } /* Azul frío */
        p { color: #bbb; font-size: 0.9rem; }

        /* Estilo del input (donde pones la clave) */
        input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 15px;
            border: 2px solid #555;
            outline: none;
            background: #1a1a1a;
            color: #fff;
            text-align: center; /* ¡ESTO CENTRA EL TEXTO! */
            font-size: 1.1rem;
            box-sizing: border-box;
            font-weight: bold;
        }

        input:focus { border-color: #5dade2; }

        /* Botón bonito (azul) */
        button {
            background: #5dade2; /* Azul frío */
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover { background: #3498db; transform: scale(1.02); }

        /* Estilo para los datos cuando entras */
        .secreto { display: none; }
        .dato-box {
            background: rgba(40, 40, 40, 0.9);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            text-align: left;
            border-left: 5px solid #5dade2;
        }
        .cerrar-btn { background: #555; margin-top: 20px; color: white; }
    </style>
</head>
<body>

    <div id="login" class="card">
        <h2>🌸 ¡Hola!</h2>
        <p>onichan mete tu llave aqui para abrirte mi interior</p>
        <input type="password" id="pass" placeholder="Tu llave secreta...">
        <button onclick="entrar()">ABRIR ⚡</button>
    </div>

    <div id="mi-boveda" class="card secreto">
        <h2>🔑 Mis Secretos</h2>
        
        <div class="dato-box">
            <strong>🎮 ROBLOX</strong><br>
            <span>User: tu_usuario | Pass: tu_clave</span>
        </div>

        <div class="dato-box" style="border-left-color: #bde0fe;">
            <strong>📧 GMAIL</strong><br>
            <span>correo@gmail.com | clave123</span>
        </div>

        <div class="dato-box" style="border-left-color: #cdb4db;">
            <strong>📸 TIKTOK</strong><br>
            <span>@usuario | password</span>
        </div>

        <button class="cerrar-btn" onclick="location.reload()">CERRAR TODO</button>
    </div>

    <script>
        function entrar() {
            var clave = document.getElementById("pass").value;
            // CAMBIA "1234" por tu clave favorita
            if (clave === "1234") { 
                document.getElementById("login").style.display = "none";
                document.getElementById("mi-boveda").style.display = "block";
            } else {
                alert("¿No eres tú, onichan? Esa no es la llave... ⚡❌");
            }
        }
    </script>
</body>
</html>
