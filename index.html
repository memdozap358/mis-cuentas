<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ La Bóveda del Rey de los Piratas ⚡</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Fondo de One Piece - Luffy */
            background: #000 url('https://wallpaperaccess.com/full/17350.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Capa oscura para que el fondo no moleste la vista */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px #3498db; /* Brillo azul eléctrico */
            text-align: center;
            width: 90%;
            max-width: 380px;
            border: 2px solid #3498db;
        }

        h2 { color: #3498db; margin: 0; font-size: 1.8rem; text-transform: uppercase; }
        p { color: #aaa; margin-top: 10px; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 15px;
            margin: 25px 0;
            border-radius: 10px;
            border: 1px solid #333;
            background: #000;
            color: #3498db;
            /* ESTO CENTRA EL TEXTO PERFECTO */
            text-align: center; 
            font-size: 1.2rem;
            font-weight: bold;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: #3498db; box-shadow: 0 0 10px #3498db; }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { background: #2980b9; transform: scale(1.03); }

        .secreto { display: none; }
        .dato-box {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: left;
            border-left: 4px solid #3498db;
            color: white;
        }
        .cerrar-btn { background: #e74c3c; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login" class="card">
        <h2>🏴‍☠️ ¡HOLA!</h2>
        <p>onichan mete tu llave aqui para abrirte mi interior</p>
        <input type="password" id="pass" placeholder="LLAVE MAESTRA">
        <button onclick="entrar()">ABRIR PORTAL ⚡</button>
    </div>

    <div id="mi-boveda" class="card secreto">
        <h2 style="color: #f1c40f;">💎 TESOROS</h2>
        <br>
        <div class="dato-box">
            <strong style="color: #3498db;">🎮 ROBLOX:</strong><br>
            <span>User: tu_usuario | Pass: tu_clave</span>
        </div>
        <div class="dato-box">
            <strong style="color: #3498db;">📧 GMAIL:</strong><br>
            <span>correo@gmail.com | clave123</span>
        </div>
        <button class="cerrar-btn" onclick="location.reload()">CERRAR BÓVEDA</button>
    </div>

    <script>
        function entrar() {
            var clave = document.getElementById("pass").value;
            // TU CLAVE ACTUAL: 904369662
            if (clave === "904369662") { 
                document.getElementById("login").style.display = "none";
                document.getElementById("mi-boveda").style.display = "block";
            } else {
                alert("¿No eres tú, onichan? Esa llave no abre mi interior... ❌");
            }
        }
    </script>
</body>
</html>
