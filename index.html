<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>⚡ Nakama Vault Pro ⚡</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
            background: #000 url('https://images.alphacoders.com/134/1342939.png') no-repeat center center fixed;
            background-size: cover; color: white; overflow: hidden;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: -1; }
        .card { 
            background: rgba(10, 10, 10, 0.95); padding: 25px; border-radius: 20px; text-align: center; 
            border: 2px solid #ff0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); 
            width: 90%; max-width: 800px; box-sizing: border-box;
        }
        #login-screen { width: 400px; }
        input { 
            width: 80%; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ff0000; 
            background: #000; color: #fff; text-align: center; font-size: 1.2rem; outline: none; 
        }
        .main-btn { 
            background: #ff0000; color: white; border: none; padding: 15px; border-radius: 8px; 
            width: 85%; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        #dashboard-screen { display: none; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .menu-btn { 
            background: rgba(20, 20, 20, 0.8); color: #ff0000; border: 1px solid #ff0000; 
            padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem;
        }
        .menu-btn.active { background: #ff0000; color: white; }
        .seccion-cuentas { 
            display: none; text-align: left; max-height: 450px; overflow-y: auto; 
            margin-top: 20px; border-top: 2px solid #ff0000; padding: 15px 5px;
        }
        .visible { display: block; }
        .dato-box { 
            background: rgba(50, 0, 0, 0.2); padding: 10px; border-radius: 8px; 
            margin-bottom: 8px; border-left: 5px solid #ff0000; font-size: 0.9rem;
            display: flex; justify-content: space-between;
        }
        .cerrar-btn { 
            background: #600; color: white; border: none; padding: 12px; 
            border-radius: 8px; width: 100%; cursor: pointer; margin-top: 15px; font-weight: bold;
        }
        .seccion-cuentas::-webkit-scrollbar { width: 8px; }
        .seccion-cuentas::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2 style="color: #ff0000;">🏴‍☠️ NAKAMA VAULT</h2>
        <p>❤ onichan mete tu llave aqui para abrirte mi interior ❤</p>
        <input type="password" id="pass" placeholder="LLAVE MAESTRA" onkeypress="handleKeyPress(event)">
        <button class="main-btn" onclick="entrar()">ABRIR PORTAL ⚡</button>
    </div>

    <div id="dashboard-screen" class="card">
        <h2 style="color: #f1c40f;">💎 MIS TESOROS</h2>
        <div class="menu-grid">
            <button class="menu-btn" onclick="mostrar('roblox', this)">🎮 ROBLOX</button>
            <button class="menu-btn" onclick="mostrar('tiktok', this)">📱 TIKTOK</button>
            <button class="menu-btn" onclick="mostrar('facebook', this)">👥 FB</button>
            <button class="menu-btn" onclick="mostrar('instagram', this)">📸 INSTA</button>
            <button class="menu-btn" onclick="mostrar('gmail', this)">📧 GMAIL</button>
            <button class="menu-btn" onclick="mostrar('otros', this)">➕ OTROS</button>
        </div>

        <div id="roblox" class="seccion-cuentas visible">
            <h3 style="color: #ff404f;">🎮 CUENTAS ROBLOX</h3>
            <div id="cont-roblox"></div>
        </div>
        <div id="tiktok" class="seccion-cuentas">
            <h3 style="color: #ff404f;">📱 PERFILES TIKTOK</h3>
            <div id="cont-tiktok"></div>
        </div>
        <div id="facebook" class="seccion-cuentas">
            <h3 style="color: #ff404f;">👥 CUENTAS FB</h3>
            <div id="cont-facebook"></div>
        </div>
        <div id="instagram" class="seccion-cuentas">
            <h3 style="color: #ff404f;">📸 CUENTAS INSTA</h3>
            <div id="cont-instagram"></div>
        </div>
        <div id="gmail" class="seccion-cuentas">
            <h3 style="color: #ff404f;">📧 CORREOS GMAIL</h3>
            <div id="cont-gmail"></div>
        </div>
        <div id="otros" class="seccion-cuentas">
            <h3 style="color: #ff404f;">➕ OTROS DATOS</h3>
            <div id="cont-otros"></div>
        </div>

        <button class="cerrar-btn" onclick="location.reload()">CERRAR SESIÓN</button>
    </div>

    <script>
        // Genera los 30 espacios para TODAS las secciones sin excepción
        const secciones = ['roblox', 'tiktok', 'facebook', 'instagram', 'gmail', 'otros'];
        secciones.forEach(sec => {
            const container = document.getElementById('cont-' + sec);
            for(let i=1; i<=30; i++){
                container.innerHTML += `<div class="dato-box"><strong>CUENTA ${i}:</strong> <span>USER: --- | PASS: ---</span></div>`;
            }
        });

        function handleKeyPress(e) { if(e.keyCode === 13) entrar(); }

        function entrar() {
            if (document.getElementById("pass").value === "904369662") { 
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("dashboard-screen").style.display = "block";
            } else { alert("Llave incorrecta."); }
        }

        function mostrar(id, btn) {
            let s = document.getElementsByClassName("seccion-cuentas");
            for (let i = 0; i < s.length; i++) s[i].classList.remove("visible");
            let b = document.getElementsByClassName("menu-btn");
            for (let i = 0; i < b.length; i++) b[i].classList.remove("active");
            document.getElementById(id).classList.add("visible");
            btn.classList.add("active");
        }
    </script>
</body>
</html>
